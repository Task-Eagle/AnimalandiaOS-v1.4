<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦁🐆🍃AnimalandiaOS</title>

<style>
:root {
    --taskbar-height: 48px;
    --accent: #4da3ff;
    --glass: rgba(255,255,255,0.12);
    --dark: rgba(20,20,20,0.65);
    --text: white;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    font-family: Segoe UI, sans-serif;
}

body {
    overflow: hidden;
    height: 100vh;
    background: linear-gradient(to bottom,#0a0a2e,#1a1a4e,#0d0d3a);
    color: white;
}

#boot-screen,
#login-screen {
    position: fixed;
    inset: 0;
    z-index: 9999999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: black;
}

#boot-screen {
    animation: bootFade 1s forwards;
    animation-delay: 2.4s;
}

@keyframes bootFade {
    to {
        opacity: 0;
        visibility: hidden;
    }
}

.boot-loader {
    width: 240px;
    height: 6px;
    background: #222;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 20px;
}

.boot-loader::after {
    content: '';
    display: block;
    width: 0;
    height: 100%;
    background: #4da3ff;
    animation: boot 2.2s linear forwards;
}

@keyframes boot {
    to { width: 100%; }
}

#login-screen {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(20px);
}

.login-card {
    width: 340px;
    padding: 30px;
    border-radius: 22px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.login-card input,
.login-card button {
    padding: 12px;
    border-radius: 10px;
    border: none;
}

#desktop {
    width: 100%;
    height: calc(100vh - var(--taskbar-height));
    position: relative;
    padding: 20px;
    display: flex;
    flex-direction: column;
    flex-wrap: wrap;
    gap: 20px;
}

.desktop-icon {
    width: 90px;
    text-align: center;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    position: relative; /* Allows us to change top/left */
    transition: transform 0.1s; /* Smooth hover effect */
}

.desktop-icon.dragging {
    opacity: 0.7;
    cursor: grabbing;
    z-index: 1000; /* Bring to front while dragging */
}

.desktop-icon:hover,
.desktop-icon.selected {
    background: rgba(255,255,255,0.12);
}

.desktop-icon img {
    width: 48px;
    height: 48px;
}

.window {
    position: absolute;
    width: 700px;
    height: 450px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    overflow: hidden;
    backdrop-filter: blur(24px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    animation: openAnim .18s ease;
    transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), 
                opacity 0.2s ease, 
                left 0.2s ease, 
                top 0.2s ease, 
                width 0.2s ease, 
                height 0.2s ease;
}

/* Add a visual cue for snap zones (invisible until hovered) */
.snap-zone-indicator {
    position: fixed;
    top: 0;
    height: 100vh;
    width: 50%;
    background: rgba(77, 163, 255, 0.1);
    border: 2px dashed rgba(77, 163, 255, 0.3);
    display: none;
    pointer-events: none;
    z-index: 99998;
}

@keyframes openAnim {
    from {
        transform: scale(.92);
        opacity: 0;
    }

    to {
        transform: scale(1);
        opacity: 1;
    }
}

.titlebar {
    height: 42px;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
}

.window-buttons {
    display: flex;
    gap: 8px;
}

.window-btn {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    cursor: pointer;
}

.close { background: #ff5f56; }
.min { background: #ffbd2e; }
.max { background: #27c93f; }

.window-content {
    width: 100%;
    height: calc(100% - 42px);
}

.resize-handle {
    width: 18px;
    height: 18px;
    position: absolute;
    right: 0;
    bottom: 0;
    cursor: nwse-resize;
}

#taskbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: var(--taskbar-height);
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.taskbar-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.taskbar-icon:hover {
    background: rgba(255,255,255,0.12);
}

.taskbar-icon img {
    width: 24px;
}

#desktop-menu {
    position: fixed;
    width: 220px;
    background: rgba(20,20,20,0.95);
    border-radius: 12px;
    overflow: hidden;
    display: none;
    z-index: 999999;
}

#desktop-menu div {
    padding: 12px;
    cursor: pointer;
}

#desktop-menu div:hover {
    background: rgba(255,255,255,0.08);
}

#selection-box {
    position: fixed;
    border: 1px solid #4da3ff;
    background: rgba(77,163,255,0.2);
    display: none;
    pointer-events: none;
}

#notification-center {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 300px;
    z-index: 999999;
}

.notification {
    background: rgba(20,20,20,0.9);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
}

#alt-tab {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: rgba(20,20,20,0.95);
    padding: 20px;
    border-radius: 20px;
    display: none;
    z-index: 999999;
}

#desktop-switcher {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 8px;
    z-index: 999999;
}

#desktop-switcher button {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.12);
    color: white;
}

/* Update the inline style or CSS rule for #clock-widget */
#clock-widget {
    /* ... existing styles ... */
    z-index: 999; /* Lowered from 99999. Windows go up to ~100+, so this stays above desktop but below active windows */
}

.app-btn,
.app-input {
    padding: 10px;
    border-radius: 10px;
    border: none;
}

.app-btn {
    background: #4da3ff;
    color: white;
}
</style>
</head>
<body>

<div id="boot-screen">
    <h1>🦁 AnimalandiaOS</h1>
    <div class="boot-loader"></div>
</div>

<div id="login-screen">
    <div class="login-card">
        <h2>Welcome</h2>
        <input id="login-name" placeholder="Username">
        <button onclick="loginOS()">Login</button>
    </div>
</div>

<div id="desktop-menu">
    <div onclick="cycleWallpaper()">Next Wallpaper</div>
    <div onclick="openWindow('Settings')">Settings</div>
    <div onclick="notify('Desktop refreshed')">Refresh</div>
</div>

<div id="selection-box"></div>
<div id="notification-center"></div>
<div id="alt-tab"></div>

<div id="desktop-switcher">
    <button onclick="switchDesktop(0)">1</button>
    <button onclick="switchDesktop(1)">2</button>
    <button onclick="switchDesktop(2)">3</button>
</div>

<div id="clock-widget" style="position:fixed; top:20px; right:20px; background:rgba(20,20,20,0.85); backdrop-filter:blur(10px); padding:15px; border-radius:12px; color:white; font-family:'Segoe UI', sans-serif; z-index:99999; border:1px solid rgba(255,255,255,0.1); display:none;">
    <div id="clock-time" style="font-size:24px; font-weight:bold; color:#4da3ff;">--:--</div>
    <div id="clock-date" style="font-size:14px; margin-top:5px; color:#ddd;">Loading...</div>
</div>

<div id="desktop">

<div class="desktop-icon" ondblclick="openWindow('Computer')">
    <img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png">
    <div>Computer</div>
</div>

<div class="desktop-icon" ondblclick="openWindow('Browser')">
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968604.png">
    <div>Browser</div>
</div>

<div class="desktop-icon" ondblclick="openWindow('Music')">
    <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
    <div>Music</div>
</div>

<div class="desktop-icon" ondblclick="openWindow('Paint')">
    <img src="https://cdn-icons-png.flaticon.com/512/2970/2970785.png">
    <div>Paint</div>
</div>

</div>

<!-- NEW START MENU CONTAINER -->
<div id="start-menu" style="position:fixed; bottom:58px; left:10px; width:240px; background:rgba(20,20,20,0.95); border-radius:12px; padding:10px; display:none; z-index:999999; border:1px solid rgba(255,255,255,0.1);">
    <div style="padding:10px; font-weight:bold; color:#4da3ff; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:10px;">
        🦁 AnimalandiaOS
    </div>
    <div onclick="openWindow('Tulo')" style="padding:10px; cursor:pointer; display:flex; align-items:center; gap:10px;">
        🐢 Tulo Writer
    </div>
    <div onclick="openWindow('Explorer')" style="padding:10px; cursor:pointer; display:flex; align-items:center; gap:10px;">
        📂 File Explorer
    </div>
    <div onclick="openWindow('Settings')" style="padding:10px; cursor:pointer; display:flex; align-items:center; gap:10px;">
        ⚙️ Settings
    </div>
    <div onclick="location.reload()" style="padding:10px; cursor:pointer; color:#ff5f56; margin-top:10px;">
        🛑 Shut Down
    </div>
</div>

<div id="taskbar">
    <!-- THE LION START BUTTON -->
    <div class="taskbar-icon" id="start-btn" onclick="toggleStartMenu()" style="background:rgba(255,255,255,0.1);">
        <span style="font-size:20px;">🦁</span>
    </div>
    
    <!-- Dynamic Taskbar Items will be injected here by JS -->
    <div id="taskbar-apps" style="display:flex; gap:8px;"></div>

    <!-- Existing Static Icons (Optional, or move them to Start Menu) -->
    <div class="taskbar-icon" onclick="openWindow('Browser')">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968604.png">
    </div>
    <div class="taskbar-icon" onclick="openWindow('Settings')">
        <img src="https://cdn-icons-png.flaticon.com/512/2040/2040509.png">
    </div>
</div>

<script>
const OS = {
    theme: localStorage.getItem('animal-theme') || 'dark',
    wallpaper: localStorage.getItem('animal-wallpaper') || 'space',
    currentDesktop: 0,
    sounds: true
};

let z = 10;
let altIndex = 0;

const openWindowsRegistry = {};

const wallpapers = {
    space: 'linear-gradient(to bottom,#0a0a2e,#1a1a4e,#0d0d3a)',
    sunset: 'linear-gradient(135deg,#ff7e5f,#feb47b)',
    forest: 'linear-gradient(135deg,#0f2027,#203a43,#2c5364)',
    neon: 'linear-gradient(135deg,#0f0c29,#302b63,#24243e)'
};

let virtualFileSystem = JSON.parse(localStorage.getItem('animal-files') || '[]');

function loginOS() {
    document.getElementById('login-screen').style.display = 'none';
}


// Call this after the login screen is gone
setTimeout(initDraggableIcons, 3500);

function toggleStartMenu() {
    const menu = document.getElementById('start-menu');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

// Close start menu if clicking elsewhere
window.addEventListener('click', (e) => {
    const menu = document.getElementById('start-menu');
    const btn = document.getElementById('start-btn');
    if (!menu.contains(e.target) && !btn.contains(e.target)) {
        menu.style.display = 'none';
    }
});

function applyWallpaper(name) {
    document.body.style.background = wallpapers[name];
    OS.wallpaper = name;
    localStorage.setItem('animal-wallpaper', name);
}

function cycleWallpaper() {
    const keys = Object.keys(wallpapers);
    const current = keys.indexOf(OS.wallpaper);
    const next = keys[(current + 1) % keys.length];
    applyWallpaper(next);
}

function notify(text) {
    const center = document.getElementById('notification-center');

    const note = document.createElement('div');
    note.className = 'notification';
    note.innerText = text;

    center.appendChild(note);

    setTimeout(() => note.remove(), 4000);
}

function createTaskbarItem(id, title) {
    const container = document.getElementById('taskbar-apps');
    const item = document.createElement('div');
    item.className = 'taskbar-icon';
    item.id = 'tb-' + id;
    item.onclick = () => {
        const win = openWindowsRegistry[id];
        if (win.style.display === 'none') {
            win.style.display = 'block';
            win.style.zIndex = ++z;
        } else {
            // If already visible and focused, minimize it
            if (win.style.zIndex == z) {
                win.style.display = 'none';
            } else {
                win.style.zIndex = ++z;
            }
        }
    };
    
    // Simple icon logic based on ID
    let iconEmoji = '📄';
    if(id === 'browser') iconEmoji = '🌐';
    if(id === 'tulo') iconEmoji = '🐢';
    if(id === 'explorer') iconEmoji = '📂';
    if(id === 'settings') iconEmoji = '⚙️';
    
    item.innerHTML = `<span style="font-size:18px;">${iconEmoji}</span>`;
    container.appendChild(item);
}

function removeTaskbarItem(id) {
    const item = document.getElementById('tb-' + id);
    if (item) item.remove();
}

function highlightTaskbar(id) {
    // Optional: Add a visual indicator (like a border) to the active taskbar item
    document.querySelectorAll('.taskbar-icon').forEach(el => el.style.borderBottom = 'none');
    const item = document.getElementById('tb-' + id);
    if(item) item.style.borderBottom = '2px solid #4da3ff';
}
    
function openWindow(title) {
    const id = title.toLowerCase();

    // If already open, bring to front
    if (openWindowsRegistry[id]) {
        openWindowsRegistry[id].style.display = 'block';
        openWindowsRegistry[id].style.zIndex = ++z;
        // Highlight taskbar item
        highlightTaskbar(id);
        return;
    }

    const win = document.createElement('div');
    win.className = 'window';
    win.dataset.desktop = OS.currentDesktop;
    win.dataset.id = id; // Important for tracking

    win.style.left = Math.random() * 300 + 100 + 'px';
    win.style.top = Math.random() * 100 + 80 + 'px';

    win.innerHTML = `
        <div class="titlebar">
            <div class="window-buttons">
                <div class="window-btn close"></div>
                <div class="window-btn min"></div>
                <div class="window-btn max"></div>
            </div>
            <div>${title}</div>
            <div></div>
        </div>
        <div class="window-content"></div>
        <div class="resize-handle"></div>
    `;

    document.getElementById('desktop').appendChild(win);
    openWindowsRegistry[id] = win;

    // --- NEW: Create Taskbar Item ---
    createTaskbarItem(id, title);

    renderApp(id, win.querySelector('.window-content'));

    // Close Logic
    win.querySelector('.close').onclick = () => {
        win.remove();
        delete openWindowsRegistry[id];
        removeTaskbarItem(id); // Remove button
    };

    win.querySelector('.min').onclick = () => {
        win.style.display = 'none';
    };

    win.querySelector('.max').onclick = () => {
        toggleMax(win);
    };

    // Clicking window brings it to front
    win.addEventListener('mousedown', () => {
        win.style.zIndex = ++z;
        highlightTaskbar(id);
    });

    dragWindow(win);
    resizeWindow(win);
    notify(title + ' opened');
}

function toggleMax(win) {
    if (!win.classList.contains('maxed')) {
        win.dataset.left = win.style.left;
        win.dataset.top = win.style.top;
        win.dataset.width = win.style.width;
        win.dataset.height = win.style.height;

        win.style.left = '0';
        win.style.top = '0';
        win.style.width = '100%';
        win.style.height = 'calc(100vh - 48px)';

        win.classList.add('maxed');
    } else {
        win.style.left = win.dataset.left;
        win.style.top = win.dataset.top;
        win.style.width = win.dataset.width;
        win.style.height = win.dataset.height;

        win.classList.remove('maxed');
    }
}

const snapPreview = document.createElement('div');
snapPreview.className = 'snap-zone-indicator';
document.body.appendChild(snapPreview);

function dragWindow(win) {
    const bar = win.querySelector('.titlebar');
    let dragging = false;
    let ox = 0;
    let oy = 0;

    bar.addEventListener('mousedown', e => {
        dragging = true;
        ox = e.clientX - win.offsetLeft;
        oy = e.clientY - win.offsetTop;
        win.style.zIndex = ++z;
    });

    window.addEventListener('mousemove', e => {
        if (!dragging) return;

        win.style.left = e.clientX - ox + 'px';
        win.style.top = e.clientY - oy + 'px';

        // --- SNAPPING PREVIEW LOGIC ---
        const winRect = win.getBoundingClientRect();
        const screenW = window.innerWidth;
        const threshold = 20; // Pixels from edge to trigger snap

        // Reset preview
        snapPreview.style.display = 'none';

        if (e.clientX <= threshold) {
            // Left Snap Preview
            snapPreview.style.display = 'block';
            snapPreview.style.left = '0';
            snapPreview.style.width = '50%';
            snapPreview.style.top = '0';
            snapPreview.style.borderRight = 'none';
        } else if (e.clientX >= screenW - threshold) {
            // Right Snap Preview
            snapPreview.style.display = 'block';
            snapPreview.style.left = '50%';
            snapPreview.style.width = '50%';
            snapPreview.style.top = '0';
            snapPreview.style.borderLeft = 'none';
        }
    });

    window.addEventListener('mouseup', () => {
        dragging = false;
        snapPreview.style.display = 'none'; // Hide preview on release
        
        // Actually snap if close enough
        const winRect = win.getBoundingClientRect();
        const screenW = window.innerWidth;
        
        if (winRect.left <= 20) {
            snapWindow(win, 'left');
        } else if (winRect.right >= screenW - 20) {
            snapWindow(win, 'right');
        }
    });
}

function resizeWindow(win) {
    const handle = win.querySelector('.resize-handle');

    handle.addEventListener('mousedown', e => {
        e.preventDefault();

        const sw = win.offsetWidth;
        const sh = win.offsetHeight;
        const sx = e.clientX;
        const sy = e.clientY;

        function move(ev) {
            win.style.width = sw + (ev.clientX - sx) + 'px';
            win.style.height = sh + (ev.clientY - sy) + 'px';
        }

        function stop() {
            removeEventListener('mousemove', move);
            removeEventListener('mouseup', stop);
        }

        addEventListener('mousemove', move);
        addEventListener('mouseup', stop);
    });
}

function snapWindow(win, side) {
    // Remove the preview class if it was added via CSS
    win.style.transition = 'all 0.2s ease'; // Ensure smooth snap
    
    if (side === 'left') {
        win.style.left = '0';
        win.style.top = '0';
        win.style.width = '50%';
        win.style.height = 'calc(100vh - 48px)';
    } else if (side === 'right') {
        win.style.left = '50%';
        win.style.top = '0';
        win.style.width = '50%';
        win.style.height = 'calc(100vh - 48px)';
    }
}

function switchDesktop(index) {
    OS.currentDesktop = index;

    document.querySelectorAll('.window').forEach(win => {
        win.style.display = win.dataset.desktop == index ? 'block' : 'none';
    });
}

window.addEventListener('keydown', e => {
    if (e.altKey && e.key === 'Tab') {
        e.preventDefault();

        const ids = Object.keys(openWindowsRegistry);

        if (!ids.length) return;

        altIndex = (altIndex + 1) % ids.length;

        const current = openWindowsRegistry[ids[altIndex]];

        current.style.zIndex = ++z;

        const box = document.getElementById('alt-tab');
        box.style.display = 'block';
        box.innerText = ids[altIndex];
    }
});

window.addEventListener('keyup', e => {
    if (e.key === 'Alt') {
        document.getElementById('alt-tab').style.display = 'none';
    }
});

function updateClock() {
    const now = new Date();
    
    // Time formatting
    let hours = now.getHours();
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12; // the hour '0' should be '12'
    
    const timeString = `${hours}:${minutes} ${ampm}`;
    
    // Date formatting
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const dateString = now.toLocaleDateString('en-US', options);
    
    document.getElementById('clock-time').innerText = timeString;
    document.getElementById('clock-date').innerText = dateString;
}

// Initialize and start the clock
document.addEventListener('DOMContentLoaded', () => {
    // Show the widget after login (optional: hide during boot)
    setTimeout(() => {
        document.getElementById('clock-widget').style.display = 'block';
        updateClock(); // Run once immediately
        setInterval(updateClock, 1000); // Update every second
    }, 3500); // Wait for boot screen to fade out
});
    
function renderApp(id, container) {
    if (id === 'browser') {
        // Initialize browser data if not exists
        if (!window.browserData) {
            window.browserData = {
                tabs: [{ id: 1, url: 'https://example.com', title: 'New Tab' }],
                activeTabId: 1,
                history: [],
                bookmarks: []
            };
        }
        
        container.innerHTML = `
            <div style="display:flex; flex-direction:column; height:100%;">
                <!-- Tab Bar -->
                <div id="browser-tabs" style="display:flex; gap:2px; background:rgba(0,0,0,0.2); padding:5px 5px 0 5px; overflow-x:auto;"></div>
                
                <!-- Toolbar -->
                <div style="display:flex; gap:10px; padding:8px; background:rgba(255,255,255,0.1); border-bottom:1px solid rgba(255,255,255,0.1);">
                    <button class="app-btn" onclick="browserBack()" style="padding:5px 10px;">⬅️</button>
                    <button class="app-btn" onclick="browserForward()" style="padding:5px 10px;">➡️</button>
                    <button class="app-btn" onclick="browserRefresh()" style="padding:5px 10px;">🔄</button>
                    <input id="browser-url" class="app-input" placeholder="Enter URL..." style="flex:1;" onkeypress="if(event.key==='Enter') browserGo()">
                    <button class="app-btn" onclick="browserGo()">Go</button>
                    <button class="app-btn" onclick="addBookmark()" style="padding:5px 10px;">⭐</button>
                    <button class="app-btn" onclick="showBookmarksPanel()" style="padding:5px 10px;">📑</button>
                </div>
                
                <!-- Content Area -->
                <div id="browser-content" style="flex:1; position:relative; background:white;">
                    <!-- Iframes will be injected here -->
                </div>

function goBrowser(btn) {
    const parent = btn.closest('.window-content');
    const url = parent.querySelector('#browser-url').value;
    parent.querySelector('#browser-frame').src = url;
}

// Helper to get current active tab data
function getActiveTab() {
    return window.browserData.tabs.find(t => t.id === window.browserData.activeTabId);
}

function renderBrowserTabs() {
    const container = document.getElementById('browser-tabs');
    const contentContainer = document.getElementById('browser-content');
    if (!container || !contentContainer) return;

    container.innerHTML = '';
    contentContainer.innerHTML = '';

    window.browserData.tabs.forEach(tab => {
        // Create Tab Button
        const tabBtn = document.createElement('div');
        tabBtn.style.cssText = "padding:8px 15px; background:rgba(255,255,255,0.1); border-radius:8px 8px 0 0; cursor:pointer; font-size:14px; display:flex; align-items:center; gap:5px;";
        if (tab.id === window.browserData.activeTabId) {
            tabBtn.style.background = 'rgba(255,255,255,0.25)';
            tabBtn.style.fontWeight = 'bold';
        }
        
        tabBtn.innerHTML = `
            <span>${tab.title.substring(0, 15)}${tab.title.length > 15 ? '...' : ''}</span>
            <span onclick="closeTab(${tab.id}, event)" style="margin-left:5px; opacity:0.6;">&times;</span>
        `;
        
        tabBtn.onclick = () => switchTab(tab.id);
        container.appendChild(tabBtn);

        // Create Iframe for this tab
        const iframe = document.createElement('iframe');
        iframe.src = tab.url;
        iframe.style.cssText = "width:100%; height:100%; border:none; display:" + (tab.id === window.browserData.activeTabId ? 'block' : 'none');
        iframe.id = `iframe-${tab.id}`;
        
        // Update URL bar when iframe loads (basic)
        iframe.onload = () => {
            const urlInput = document.getElementById('browser-url');
            if(urlInput) urlInput.value = tab.url;
            // Try to get title (might fail due to CORS, but good for local/simple sites)
            try {
                tab.title = iframe.contentDocument.title || tab.url;
                renderBrowserTabs(); // Re-render to update title
            } catch(e) {}
        };

        contentContainer.appendChild(iframe);
    });
}

function switchTab(id) {
    window.browserData.activeTabId = id;
    renderBrowserTabs();
    // Update URL bar
    const tab = getActiveTab();
    const urlInput = document.getElementById('browser-url');
    if(urlInput && tab) urlInput.value = tab.url;
}

function closeTab(id, e) {
    if(e) e.stopPropagation();
    const index = window.browserData.tabs.findIndex(t => t.id === id);
    if (index === -1) return;

    window.browserData.tabs.splice(index, 1);
    
    // If we closed the active tab, switch to another
    if (window.browserData.activeTabId === id) {
        window.browserData.activeTabId = window.browserData.tabs.length > 0 ? window.browserData.tabs[0].id : null;
    }
    
    if (window.browserData.tabs.length === 0) {
        // If no tabs left, maybe close window? Or just leave empty.
        // For now, let's just create a new blank tab
        const newId = Date.now();
        window.browserData.tabs.push({ id: newId, url: 'about:blank', title: 'New Tab' });
        window.browserData.activeTabId = newId;
    }
    
    renderBrowserTabs();
}

function browserGo() {
    const urlInput = document.getElementById('browser-url');
    let url = urlInput.value;
    
    if (!url.startsWith('http')) {
        url = 'https://' + url;
    }

    const activeTab = getActiveTab();
    if (activeTab) {
        // Add to history
        window.browserData.history.push({ url: activeTab.url, time: Date.now() });
        activeTab.url = url;
        activeTab.title = url; // Default title
        renderBrowserTabs();
    }
}

function browserBack() {
    // Simple back logic: pop last history item
    if (window.browserData.history.length > 0) {
        const last = window.browserData.history.pop();
        const activeTab = getActiveTab();
        if (activeTab) {
            activeTab.url = last.url;
            renderBrowserTabs();
        }
    }
}

function browserForward() {
    // Forward logic requires a forward stack, skipping for simplicity or implement if needed
    notify("Forward history not implemented yet.");
}

function browserRefresh() {
    const activeTab = getActiveTab();
    if (activeTab) {
        const iframe = document.getElementById(`iframe-${activeTab.id}`);
        if (iframe) iframe.src = iframe.src;
    }
}

function addBookmark() {
    const activeTab = getActiveTab();
    if (!activeTab) return;
    
    const title = prompt("Name this bookmark:", activeTab.title);
    if (title) {
        window.browserData.bookmarks.push({ title: title, url: activeTab.url });
        notify("Bookmark added!");
        showBookmarksPanel();
    }
}

function showBookmarksPanel() {
    const panel = document.getElementById('bookmarks-panel');
    const list = document.getElementById('bookmarks-list');
    if (!panel || !list) return;
    
    list.innerHTML = '';
    window.browserData.bookmarks.forEach(bm => {
        const item = document.createElement('div');
        item.style.cssText = "padding:8px; border-bottom:1px solid rgba(255,255,255,0.1); cursor:pointer;";
        item.innerHTML = `<strong>${bm.title}</strong><br><small>${bm.url}</small>`;
        item.onclick = () => {
            const activeTab = getActiveTab();
            if(activeTab) {
                activeTab.url = bm.url;
                renderBrowserTabs();
            }
            closeBookmarksPanel();
        };
        list.appendChild(item);
    });
    
    panel.style.display = 'block';
}

function closeBookmarksPanel() {
    document.getElementById('bookmarks-panel').style.display = 'none';
}

function initPaint() {
    const canvas = document.getElementById('paint');
    const ctx = canvas.getContext('2d');

    let draw = false;

    canvas.addEventListener('mousedown', () => draw = true);
    canvas.addEventListener('mouseup', () => draw = false);

    canvas.addEventListener('mousemove', e => {
        if (!draw) return;

        ctx.fillRect(e.offsetX,e.offsetY,4,4);
    });
}

function saveStory() {
    const text = document.getElementById('story-text').value;
    if (!text.trim()) {
        notify("Tulo says: Write something first!");
        return;
    }

    const fileName = prompt("Name your story (e.g., 'LionKingChapter1'):");
    if (!fileName) return;

    const newFile = {
        name: fileName,
        content: text,
        date: new Date().toLocaleDateString()
    };

    virtualFileSystem.push(newFile);
    localStorage.setItem('animal-files', JSON.stringify(virtualFileSystem));
    
    notify(`Saved: ${fileName}`);
    document.getElementById('save-status').innerText = "Story saved to virtual memory!";
}

function clearStory() {
    if(confirm("Clear the text area?")) {
        document.getElementById('story-text').value = "";
    }
}

function loadFiles() {
    const list = document.getElementById('file-list');
    if (!list) return;
    
    list.innerHTML = "";
    
    if (virtualFileSystem.length === 0) {
        list.innerHTML = "<p>No stories yet. Open Tulo to write!</p>";
        return;
    }

    virtualFileSystem.forEach((file, index) => {
        const card = document.createElement('div');
        card.style.cssText = "background:rgba(255,255,255,0.1); padding:15px; border-radius:8px; width:150px; text-align:center; cursor:pointer; border:1px solid rgba(255,255,255,0.1);";
        card.innerHTML = `
            <div style="font-size:30px;">📄</div>
            <div style="font-weight:bold; margin-top:5px;">${file.name}</div>
            <div style="font-size:10px; color:#ccc;">${file.date}</div>
        `;
        
        card.onclick = () => {
            // Open Tulo and load content
            openWindow('Tulo');
            setTimeout(() => {
                const tuloWin = openWindowsRegistry['tulo'];
                if(tuloWin) {
                    const textarea = tuloWin.querySelector('#story-text');
                    if(textarea) textarea.value = file.content;
                }
            }, 100);
        };
        
        list.appendChild(card);
    });
}

const menu = document.getElementById('desktop-menu');

window.addEventListener('contextmenu', e => {
    e.preventDefault();

    menu.style.display = 'block';
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
});

window.addEventListener('click', () => {
    menu.style.display = 'none';
});

const desktop = document.getElementById('desktop');
const selection = document.getElementById('selection-box');

let selecting = false;
let sx = 0;
let sy = 0;

desktop.addEventListener('mousedown', e => {
    if (e.target !== desktop) return;

    selecting = true;

    sx = e.clientX;
    sy = e.clientY;

    selection.style.display = 'block';
});

window.addEventListener('mousemove', e => {
    if (!selecting) return;

    selection.style.left = Math.min(sx,e.clientX) + 'px';
    selection.style.top = Math.min(sy,e.clientY) + 'px';
    selection.style.width = Math.abs(e.clientX - sx) + 'px';
    selection.style.height = Math.abs(e.clientY - sy) + 'px';
});

window.addEventListener('mouseup', () => {
    selecting = false;
    selection.style.display = 'none';
});

window.onload = () => {
    applyWallpaper(OS.wallpaper);

    setTimeout(() => {
        document.getElementById('boot-screen').style.display = 'none';
    }, 3400);

    notify('Welcome to AnimalandiaOS Ultimate');
};

    function initDraggableIcons() {
    const icons = document.querySelectorAll('.desktop-icon');
    let activeIcon = null;
    let offsetX = 0;
    let offsetY = 0;

    icons.forEach(icon => {
        icon.addEventListener('mousedown', (e) => {
            // Prevent dragging if clicking text or image specifically (optional refinement)
            if (e.target.tagName === 'IMG' || e.target.tagName === 'DIV') return;

            activeIcon = icon;
            
            // Calculate offset so the icon doesn't jump to mouse cursor
            const rect = icon.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;

            icon.classList.add('dragging');
            icon.style.position = 'absolute'; // Switch to absolute for free movement
            
            // Set initial position relative to viewport
            icon.style.left = (rect.left) + 'px';
            icon.style.top = (rect.top) + 'px';
        });
    });

    window.addEventListener('mousemove', (e) => {
        if (!activeIcon) return;

        e.preventDefault();
        
        // Move the icon
        const newX = e.clientX - offsetX;
        const newY = e.clientY - offsetY;

        activeIcon.style.left = newX + 'px';
        activeIcon.style.top = newY + 'px';
    });

    window.addEventListener('mouseup', () => {
        if (activeIcon) {
            activeIcon.classList.remove('dragging');
            // Optional: Snap to grid logic could go here
            activeIcon = null;
        }
    });
}

function initPixelPaint() {
    const canvas = document.getElementById('pixel-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    const colorInput = document.getElementById('pixel-color');
    const sizeInput = document.getElementById('pixel-size');
    
    // Fill white background initially
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let drawing = false;

    function getMousePos(evt) {
        const rect = canvas.getBoundingClientRect();
        // Calculate scale factor (visual size / internal size)
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        return {
            x: Math.floor((evt.clientX - rect.left) * scaleX),
            y: Math.floor((evt.clientY - rect.top) * scaleY)
        };
    }

    function drawPixel(e) {
        const pos = getMousePos(e);
        const size = parseInt(sizeInput.value);
        const color = colorInput.value;

        ctx.fillStyle = color;
        // Draw a square of 'size' pixels
        ctx.fillRect(pos.x, pos.y, size, size);
    }

    canvas.addEventListener('mousedown', (e) => {
        drawing = true;
        drawPixel(e);
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!drawing) return;
        drawPixel(e);
    });

    canvas.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('mouseleave', () => drawing = false);
}

function clearCanvas() {
    const canvas = document.getElementById('pixel-canvas');
    if (canvas) {
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
}

function downloadPixelArt() {
    const canvas = document.getElementById('pixel-canvas');
    if (!canvas) return;
    
    const link = document.createElement('a');
    link.download = 'animalandia-art.png';
    link.href = canvas.toDataURL();
    link.click();
    notify("Pixel art saved to downloads!");
}
