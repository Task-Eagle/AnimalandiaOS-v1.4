<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦁🐆🍃AnimalandiaOS</title>

<style>
:root {
    --taskbar-height: 48px;
    --accent: #4da3ff;
    --glass: rgba(255,255,255,0.12);
    --dark: rgba(20,20,20,0.65);
    --text: white;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    font-family: Segoe UI, sans-serif;
}

body {
    overflow: hidden;
    height: 100vh;
    background: linear-gradient(to bottom,#0a0a2e,#1a1a4e,#0d0d3a);
    color: white;
}

#boot-screen,
#login-screen {
    position: fixed;
    inset: 0;
    z-index: 9999999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: black;
}

#boot-screen {
    animation: bootFade 1s forwards;
    animation-delay: 2.4s;
}

@keyframes bootFade {
    to {
        opacity: 0;
        visibility: hidden;
    }
}

.boot-loader {
    width: 240px;
    height: 6px;
    background: #222;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 20px;
}

.boot-loader::after {
    content: '';
    display: block;
    width: 0;
    height: 100%;
    background: #4da3ff;
    animation: boot 2.2s linear forwards;
}

@keyframes boot {
    to { width: 100%; }
}

#login-screen {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(20px);
}

.login-card {
    width: 340px;
    padding: 30px;
    border-radius: 22px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.login-card input,
.login-card button {
    padding: 12px;
    border-radius: 10px;
    border: none;
}

#desktop {
    width: 100%;
    height: calc(100vh - var(--taskbar-height));
    position: relative;
    padding: 20px;
    display: flex;
    flex-direction: column;
    flex-wrap: wrap;
    gap: 20px;
}

.desktop-icon {
    width: 90px;
    text-align: center;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.desktop-icon:hover,
.desktop-icon.selected {
    background: rgba(255,255,255,0.12);
}

.desktop-icon img {
    width: 48px;
    height: 48px;
}

.window {
    position: absolute;
    width: 700px;
    height: 450px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    overflow: hidden;
    backdrop-filter: blur(24px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    animation: openAnim .18s ease;
    transition: all .18s ease;
}

@keyframes openAnim {
    from {
        transform: scale(.92);
        opacity: 0;
    }

    to {
        transform: scale(1);
        opacity: 1;
    }
}

.titlebar {
    height: 42px;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
}

.window-buttons {
    display: flex;
    gap: 8px;
}

.window-btn {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    cursor: pointer;
}

.close { background: #ff5f56; }
.min { background: #ffbd2e; }
.max { background: #27c93f; }

.window-content {
    width: 100%;
    height: calc(100% - 42px);
}

.resize-handle {
    width: 18px;
    height: 18px;
    position: absolute;
    right: 0;
    bottom: 0;
    cursor: nwse-resize;
}

#taskbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: var(--taskbar-height);
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.taskbar-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.taskbar-icon:hover {
    background: rgba(255,255,255,0.12);
}

.taskbar-icon img {
    width: 24px;
}

#desktop-menu {
    position: fixed;
    width: 220px;
    background: rgba(20,20,20,0.95);
    border-radius: 12px;
    overflow: hidden;
    display: none;
    z-index: 999999;
}

#desktop-menu div {
    padding: 12px;
    cursor: pointer;
}

#desktop-menu div:hover {
    background: rgba(255,255,255,0.08);
}

#selection-box {
    position: fixed;
    border: 1px solid #4da3ff;
    background: rgba(77,163,255,0.2);
    display: none;
    pointer-events: none;
}

#notification-center {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 300px;
    z-index: 999999;
}

.notification {
    background: rgba(20,20,20,0.9);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
}

#alt-tab {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: rgba(20,20,20,0.95);
    padding: 20px;
    border-radius: 20px;
    display: none;
    z-index: 999999;
}

#desktop-switcher {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 8px;
    z-index: 999999;
}

#desktop-switcher button {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.12);
    color: white;
}

.app-btn,
.app-input {
    padding: 10px;
    border-radius: 10px;
    border: none;
}

.app-btn {
    background: #4da3ff;
    color: white;
}
</style>
</head>
<body>

<div id="boot-screen">
    <h1>🦁 AnimalandiaOS</h1>
    <div class="boot-loader"></div>
</div>

<div id="login-screen">
    <div class="login-card">
        <h2>Welcome</h2>
        <input id="login-name" placeholder="Username">
        <button onclick="loginOS()">Login</button>
    </div>
</div>

<div id="desktop-menu">
    <div onclick="cycleWallpaper()">Next Wallpaper</div>
    <div onclick="openWindow('Settings')">Settings</div>
    <div onclick="notify('Desktop refreshed')">Refresh</div>
</div>

<div id="selection-box"></div>
<div id="notification-center"></div>
<div id="alt-tab"></div>

<div id="desktop-switcher">
    <button onclick="switchDesktop(0)">1</button>
    <button onclick="switchDesktop(1)">2</button>
    <button onclick="switchDesktop(2)">3</button>
</div>

<div id="desktop">

<div class="desktop-icon" ondblclick="openWindow('Computer')">
    <img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png">
    <div>Computer</div>
</div>

<div class="desktop-icon" ondblclick="openWindow('Browser')">
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968604.png">
    <div>Browser</div>
</div>

<div class="desktop-icon" ondblclick="openWindow('Music')">
    <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
    <div>Music</div>
</div>

<div class="desktop-icon" ondblclick="openWindow('Paint')">
    <img src="https://cdn-icons-png.flaticon.com/512/2970/2970785.png">
    <div>Paint</div>
</div>

</div>

<div id="taskbar">
    <div class="taskbar-icon" onclick="openWindow('Browser')">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968604.png">
    </div>

    <div class="taskbar-icon" onclick="openWindow('Settings')">
        <img src="https://cdn-icons-png.flaticon.com/512/2040/2040509.png">
    </div>

    <div class="taskbar-icon" onclick="openWindow('Store')">
        <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png">
    </div>
</div>

<script>
const OS = {
    theme: localStorage.getItem('animal-theme') || 'dark',
    wallpaper: localStorage.getItem('animal-wallpaper') || 'space',
    currentDesktop: 0,
    sounds: true
};

let z = 10;
let altIndex = 0;

const openWindowsRegistry = {};

const wallpapers = {
    space: 'linear-gradient(to bottom,#0a0a2e,#1a1a4e,#0d0d3a)',
    sunset: 'linear-gradient(135deg,#ff7e5f,#feb47b)',
    forest: 'linear-gradient(135deg,#0f2027,#203a43,#2c5364)',
    neon: 'linear-gradient(135deg,#0f0c29,#302b63,#24243e)'
};

let virtualFileSystem = JSON.parse(localStorage.getItem('animal-files') || '[]');

function loginOS() {
    document.getElementById('login-screen').style.display = 'none';
}

function applyWallpaper(name) {
    document.body.style.background = wallpapers[name];
    OS.wallpaper = name;
    localStorage.setItem('animal-wallpaper', name);
}

function cycleWallpaper() {
    const keys = Object.keys(wallpapers);
    const current = keys.indexOf(OS.wallpaper);
    const next = keys[(current + 1) % keys.length];
    applyWallpaper(next);
}

function notify(text) {
    const center = document.getElementById('notification-center');

    const note = document.createElement('div');
    note.className = 'notification';
    note.innerText = text;

    center.appendChild(note);

    setTimeout(() => note.remove(), 4000);
}

function openWindow(title) {
    const id = title.toLowerCase();

    if (openWindowsRegistry[id]) {
        openWindowsRegistry[id].style.display = 'block';
        return;
    }

    const win = document.createElement('div');
    win.className = 'window';
    win.dataset.desktop = OS.currentDesktop;

    win.style.left = Math.random() * 300 + 100 + 'px';
    win.style.top = Math.random() * 100 + 80 + 'px';

    win.innerHTML = `
        <div class="titlebar">
            <div class="window-buttons">
                <div class="window-btn close"></div>
                <div class="window-btn min"></div>
                <div class="window-btn max"></div>
            </div>
            <div>${title}</div>
            <div></div>
        </div>

        <div class="window-content"></div>
        <div class="resize-handle"></div>
    `;

    document.getElementById('desktop').appendChild(win);

    openWindowsRegistry[id] = win;

    renderApp(id, win.querySelector('.window-content'));

    win.querySelector('.close').onclick = () => {
        win.remove();
        delete openWindowsRegistry[id];
    };

    win.querySelector('.min').onclick = () => {
        win.style.display = 'none';
    };

    win.querySelector('.max').onclick = () => {
        toggleMax(win);
    };

    dragWindow(win);
    resizeWindow(win);

    notify(title + ' opened');
}

function toggleMax(win) {
    if (!win.classList.contains('maxed')) {
        win.dataset.left = win.style.left;
        win.dataset.top = win.style.top;
        win.dataset.width = win.style.width;
        win.dataset.height = win.style.height;

        win.style.left = '0';
        win.style.top = '0';
        win.style.width = '100%';
        win.style.height = 'calc(100vh - 48px)';

        win.classList.add('maxed');
    } else {
        win.style.left = win.dataset.left;
        win.style.top = win.dataset.top;
        win.style.width = win.dataset.width;
        win.style.height = win.dataset.height;

        win.classList.remove('maxed');
    }
}

function dragWindow(win) {
    const bar = win.querySelector('.titlebar');

    let dragging = false;
    let ox = 0;
    let oy = 0;

    bar.addEventListener('mousedown', e => {
        dragging = true;
        ox = e.clientX - win.offsetLeft;
        oy = e.clientY - win.offsetTop;

        win.style.zIndex = ++z;
    });

    window.addEventListener('mousemove', e => {
        if (!dragging) return;

        win.style.left = e.clientX - ox + 'px';
        win.style.top = e.clientY - oy + 'px';

        if (e.clientX <= 10) snapWindow(win, 'left');
        if (e.clientX >= innerWidth - 10) snapWindow(win, 'right');
    });

    window.addEventListener('mouseup', () => dragging = false);
}

function resizeWindow(win) {
    const handle = win.querySelector('.resize-handle');

    handle.addEventListener('mousedown', e => {
        e.preventDefault();

        const sw = win.offsetWidth;
        const sh = win.offsetHeight;
        const sx = e.clientX;
        const sy = e.clientY;

        function move(ev) {
            win.style.width = sw + (ev.clientX - sx) + 'px';
            win.style.height = sh + (ev.clientY - sy) + 'px';
        }

        function stop() {
            removeEventListener('mousemove', move);
            removeEventListener('mouseup', stop);
        }

        addEventListener('mousemove', move);
        addEventListener('mouseup', stop);
    });
}

function snapWindow(win, side) {
    if (side === 'left') {
        win.style.left = '0';
        win.style.top = '0';
        win.style.width = '50%';
        win.style.height = 'calc(100vh - 48px)';
    }

    if (side === 'right') {
        win.style.left = '50%';
        win.style.top = '0';
        win.style.width = '50%';
        win.style.height = 'calc(100vh - 48px)';
    }
}

function switchDesktop(index) {
    OS.currentDesktop = index;

    document.querySelectorAll('.window').forEach(win => {
        win.style.display = win.dataset.desktop == index ? 'block' : 'none';
    });
}

window.addEventListener('keydown', e => {
    if (e.altKey && e.key === 'Tab') {
        e.preventDefault();

        const ids = Object.keys(openWindowsRegistry);

        if (!ids.length) return;

        altIndex = (altIndex + 1) % ids.length;

        const current = openWindowsRegistry[ids[altIndex]];

        current.style.zIndex = ++z;

        const box = document.getElementById('alt-tab');
        box.style.display = 'block';
        box.innerText = ids[altIndex];
    }
});

window.addEventListener('keyup', e => {
    if (e.key === 'Alt') {
        document.getElementById('alt-tab').style.display = 'none';
    }
});

function renderApp(id, container) {

    if (id === 'browser') {
        container.innerHTML = `
            <div style="display:flex; flex-direction:column; height:100%;">
                <div style="display:flex; gap:10px; padding:10px;">
                    <input id="browser-url" class="app-input" placeholder="https://example.com">
                    <button class="app-btn" onclick="goBrowser(this)">Go</button>
                </div>

                <iframe
                    id="browser-frame"
                    sandbox="allow-scripts allow-same-origin allow-forms"
                    style="flex:1; border:none; background:white;">
                </iframe>
            </div>
        `;
    }

    else if (id === 'music') {
        container.innerHTML = `
            <div style="padding:20px;">
                <h2>Music Player</h2>
                <audio controls style="width:100%; margin-top:20px;">
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
                </audio>
            </div>
        `;
    }

    else if (id === 'paint') {
        container.innerHTML = `
            <canvas id="paint" width="900" height="500" style="background:white;"></canvas>
        `;

        setTimeout(initPaint,100);
    }

    else if (id === 'settings') {
        container.innerHTML = `
            <div style="padding:20px; display:flex; flex-direction:column; gap:14px;">
                <h2>Settings</h2>
                <button class="app-btn" onclick="cycleWallpaper()">Wallpaper</button>
                <button class="app-btn" onclick="notify('Theme changed')">Theme</button>
                <button class="app-btn" onclick="OS.sounds=!OS.sounds">Toggle Sounds</button>
            </div>
        `;
    }

    else if (id === 'store') {
        container.innerHTML = `
            <div style="padding:20px;">
                <h2>App Store</h2>
                <br>
                <button class="app-btn" onclick="openWindow('Calculator')">Install Calculator</button>
            </div>
        `;
    }

    else if (id === 'calculator') {
        container.innerHTML = `
            <iframe src="https://www.desmos.com/scientific" style="width:100%; height:100%; border:none;"></iframe>
        `;
    }

    else {
        container.innerHTML = `
            <div style="padding:20px;">
                <h1>${id}</h1>
                <br>
                <p>AnimalandiaOS app window.</p>
            </div>
        `;
    }
}

function goBrowser(btn) {
    const parent = btn.closest('.window-content');
    const url = parent.querySelector('#browser-url').value;
    parent.querySelector('#browser-frame').src = url;
}

function initPaint() {
    const canvas = document.getElementById('paint');
    const ctx = canvas.getContext('2d');

    let draw = false;

    canvas.addEventListener('mousedown', () => draw = true);
    canvas.addEventListener('mouseup', () => draw = false);

    canvas.addEventListener('mousemove', e => {
        if (!draw) return;

        ctx.fillRect(e.offsetX,e.offsetY,4,4);
    });
}

const menu = document.getElementById('desktop-menu');

window.addEventListener('contextmenu', e => {
    e.preventDefault();

    menu.style.display = 'block';
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
});

window.addEventListener('click', () => {
    menu.style.display = 'none';
});

const desktop = document.getElementById('desktop');
const selection = document.getElementById('selection-box');

let selecting = false;
let sx = 0;
let sy = 0;

desktop.addEventListener('mousedown', e => {
    if (e.target !== desktop) return;

    selecting = true;

    sx = e.clientX;
    sy = e.clientY;

    selection.style.display = 'block';
});

window.addEventListener('mousemove', e => {
    if (!selecting) return;

    selection.style.left = Math.min(sx,e.clientX) + 'px';
    selection.style.top = Math.min(sy,e.clientY) + 'px';
    selection.style.width = Math.abs(e.clientX - sx) + 'px';
    selection.style.height = Math.abs(e.clientY - sy) + 'px';
});

window.addEventListener('mouseup', () => {
    selecting = false;
    selection.style.display = 'none';
});

window.onload = () => {
    applyWallpaper(OS.wallpaper);

    setTimeout(() => {
        document.getElementById('boot-screen').style.display = 'none';
    }, 3400);

    notify('Welcome to AnimalandiaOS Ultimate');
};
</script>

</body>
</html>
